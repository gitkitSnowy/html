<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 Краш-Игра | Milk Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .game-container {
            max-width: 450px;
            margin: 0 auto;
            background: rgba(10, 20, 40, 0.95);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            font-size: 26px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 255, 255, 0.3);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .info-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
        }

        .info-card .label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
        }

        .info-card .value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd966;
        }

        .info-card .value.bet { color: #4ecdc4; }
        .info-card .value.multiplier { color: #ff6b6b; }

        /* Игровая область */
        .game-area {
            background: linear-gradient(180deg, #0a0f1a 0%, #1a1f2a 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .rocket {
            font-size: 70px;
            filter: drop-shadow(0 0 15px rgba(255, 100, 100, 0.5));
            transition: transform 0.05s linear;
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .flame {
            font-size: 25px;
            margin-top: -10px;
            animation: flameFlicker 0.1s infinite;
        }

        @keyframes flameFlicker {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .multiplier-value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-top: 15px;
        }

        .crash-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .crash-progress {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            width: 0%;
            transition: width 0.05s linear;
        }

        .game-status {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .bet-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .bet-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
        }

        .bet-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.3);
        }

        .bet-input:disabled {
            opacity: 0.5;
        }

        .bet-presets {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .preset-btn:active { transform: scale(0.96); }

        .control-panel {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:active { transform: scale(0.96); }

        .btn-success {
            background: linear-gradient(135deg, #6bff6b, #44aa44);
            color: white;
            box-shadow: 0 4px 12px rgba(107, 255, 107, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #cc5555);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .hidden { display: none; }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .result-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            max-width: 320px;
            width: 85%;
        }

        .result-card h2 { font-size: 32px; margin-bottom: 20px; }
        .result-card .win { color: #6bff6b; }
        .result-card .lose { color: #ff6b6b; }
        .result-card .amount { font-size: 28px; font-weight: bold; margin: 15px 0; }
        .result-card .close-btn { margin-top: 20px; width: 100%; padding: 12px; }

        .explosion {
            position: absolute;
            font-size: 80px;
            animation: explode 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes explode {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1001;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🚀 КРАШ-ИГРА</h1>
        </div>

        <div class="info-panel">
            <div class="info-card">
                <div class="label">🥛 БАЛАНС</div>
                <div class="value" id="balance">0.00</div>
            </div>
            <div class="info-card">
                <div class="label">💰 СТАВКА</div>
                <div class="value bet" id="betAmount">0.00</div>
            </div>
            <div class="info-card">
                <div class="label">📈 МНОЖИТЕЛЬ</div>
                <div class="value multiplier" id="multiplier">1.00</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="rocket" id="rocket">🚀</div>
            <div class="flame" id="flame">🔥</div>
            <div class="multiplier-value" id="multiplierDisplay">x1.00</div>
            <div class="crash-bar">
                <div class="crash-progress" id="crashProgress"></div>
            </div>
            <div class="game-status" id="gameStatus">⚡ Сделайте ставку</div>
        </div>

        <div class="bet-section" id="betSection">
            <input type="number" class="bet-input" id="betInput" placeholder="Введите ставку (0.1 - 100 🥛)" step="0.1" min="0.1" max="100">
            <div class="bet-presets">
                <button class="preset-btn" onclick="setBet(0.5)">0.5 🥛</button>
                <button class="preset-btn" onclick="setBet(1)">1 🥛</button>
                <button class="preset-btn" onclick="setBet(2)">2 🥛</button>
                <button class="preset-btn" onclick="setBet(5)">5 🥛</button>
                <button class="preset-btn" onclick="setBet(10)">10 🥛</button>
                <button class="preset-btn" onclick="setBet(25)">25 🥛</button>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn btn-success" id="startBtn" onclick="startGame()">🚀 СТАРТ</button>
            <button class="btn btn-danger hidden" id="cashoutBtn" onclick="cashout()">💰 ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        let balance = 0;
        let purchased = 0;
        let currentBet = 0;
        let currentMultiplier = 1.0;
        let crashPoint = 1.0;
        let gameActive = false;
        let gameInterval = null;
        let rocketY = 0;

        const tg = window.Telegram?.WebApp;

        document.addEventListener('DOMContentLoaded', () => {
            if (tg) {
                tg.expand();
                tg.ready();
                sendToBot({ action: 'getBalance' });
            }
            window.addEventListener('message', handleMessage);
        });

        function sendToBot(data) {
            if (tg) tg.sendData(JSON.stringify(data));
        }

        function handleMessage(event) {
            const data = event.data;
            if (typeof data === 'string') {
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.type === 'setBalance') {
                        balance = parsed.balance;
                        purchased = parsed.purchased;
                        updateUI();
                    } else if (parsed.type === 'error') {
                        showToast(parsed.message);
                    } else if (parsed.type === 'gameConfirmed') {
                        startGameLoop();
                    }
                } catch(e) {}
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function setBet(amount) {
            if (gameActive) {
                showToast('Игра уже идет!');
                return;
            }
            currentBet = amount;
            document.getElementById('betInput').value = amount;
            document.getElementById('betAmount').textContent = amount.toFixed(2);
        }

        function generateCrashPoint() {
            if (Math.random() < 0.2) return 1.0;
            const r = Math.random();
            if (r < 0.25) return +(Math.random() * 0.4 + 1.1).toFixed(2);
            if (r < 0.5) return +(Math.random() * 0.5 + 1.5).toFixed(2);
            if (r < 0.75) return +(Math.random() * 0.5 + 2.0).toFixed(2);
            return +(Math.random() * 0.5 + 2.5).toFixed(2);
        }

        function startGame() {
            if (gameActive) {
                showToast('Игра уже идет!');
                return;
            }

            const bet = parseFloat(document.getElementById('betInput').value);
            if (isNaN(bet) || bet < 0.1 || bet > 100) {
                showToast('❌ Ставка от 0.1 до 100 🥛');
                return;
            }
            if (bet > purchased) {
                showToast(`❌ Можно играть только на купленное молоко! Куплено: ${purchased.toFixed(2)} л`);
                return;
            }
            if (bet > balance) {
                showToast(`❌ Недостаточно молока! Баланс: ${balance.toFixed(2)} 🥛`);
                return;
            }

            currentBet = bet;
            crashPoint = generateCrashPoint();

            sendToBot({
                action: 'placeBet',
                bet: currentBet,
                crashPoint: crashPoint
            });

            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '⏳ ОЖИДАНИЕ...';
            document.getElementById('gameStatus').innerHTML = '⏳ Подтверждение ставки...';
        }

        function startGameLoop() {
            gameActive = true;
            currentMultiplier = 1.0;
            rocketY = 0;

            document.getElementById('betAmount').textContent = currentBet.toFixed(2);
            document.getElementById('betInput').disabled = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('cashoutBtn').classList.remove('hidden');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '🚀 СТАРТ';
            document.getElementById('gameStatus').innerHTML = '🚀 Ракета взлетает...';
            document.getElementById('gameStatus').style.color = '#4ecdc4';

            const rocket = document.getElementById('rocket');
            rocket.style.transform = '';

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameActive) return;

                currentMultiplier = Math.min(currentMultiplier + 0.02, crashPoint);
                updateMultiplierDisplay();

                const progress = (currentMultiplier / crashPoint) * 100;
                document.getElementById('crashProgress').style.width = Math.min(progress, 100) + '%';

                rocketY = Math.min(rocketY + 2, 60);
                rocket.style.transform = `translateY(-${rocketY}px)`;

                if (currentMultiplier >= crashPoint) crash();
            }, 40);
        }

        function updateMultiplierDisplay() {
            document.getElementById('multiplier').textContent = currentMultiplier.toFixed(2);
            document.getElementById('multiplierDisplay').textContent = `x${currentMultiplier.toFixed(2)}`;
        }

        function crash() {
            if (!gameActive) return;
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);

            const gameArea = document.getElementById('gameArea');
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.textContent = '💥';
            explosion.style.left = '50%';
            explosion.style.top = '50%';
            explosion.style.transform = 'translate(-50%, -50%)';
            gameArea.appendChild(explosion);

            const rocket = document.getElementById('rocket');
            rocket.textContent = '💥';
            rocket.style.animation = 'none';
            document.getElementById('flame').style.display = 'none';

            document.getElementById('gameStatus').innerHTML = `💥 КРАХ! x${crashPoint.toFixed(2)} 💥`;
            document.getElementById('gameStatus').style.color = '#ff6b6b';

            setTimeout(() => explosion.remove(), 500);

            sendToBot({
                action: 'gameResult',
                won: false,
                bet: currentBet,
                multiplier: crashPoint
            });

            setTimeout(() => showResult(false, currentBet, crashPoint), 800);
            setTimeout(() => resetUI(), 2000);
        }

        function cashout() {
            if (!gameActive) return;
            gameActive = false;
            if (gameInterval) clearInterval(gameInterval);

            const winAmount = currentBet * currentMultiplier;

            document.getElementById('gameStatus').innerHTML = `✅ ВЫИГРЫШ ЗАБРАН! +${winAmount.toFixed(2)} 🥛`;
            document.getElementById('gameStatus').style.color = '#6bff6b';

            const rocket = document.getElementById('rocket');
            rocket.style.animation = 'none';
            rocket.style.transform = 'scale(1.2)';
            setTimeout(() => rocket.style.transform = '', 300);

            sendToBot({
                action: 'gameResult',
                won: true,
                bet: currentBet,
                multiplier: currentMultiplier,
                winAmount: winAmount
            });

            showResult(true, winAmount, currentMultiplier);
            setTimeout(() => resetUI(), 2000);
        }

        function showResult(won, amount, multiplier) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result-overlay';
            resultDiv.innerHTML = `
                <div class="result-card">
                    <h2 class="${won ? 'win' : 'lose'}">${won ? '🎉 ПОБЕДА! 🎉' : '💥 ПРОИГРЫШ! 💥'}</h2>
                    ${won ? `
                        <div class="amount win">+${amount.toFixed(2)} 🥛</div>
                        <p>📈 Множитель: <strong>x${multiplier.toFixed(2)}</strong></p>
                    ` : `
                        <div class="amount lose">-${amount.toFixed(2)} 🥛</div>
                        <p>💥 Краш на: <strong>x${multiplier.toFixed(2)}</strong></p>
                    `}
                    <button class="btn btn-primary close-btn" onclick="this.closest('.result-overlay').remove()">✖️ Закрыть</button>
                </div>
            `;
            document.body.appendChild(resultDiv);
        }

        function resetUI() {
            const rocket = document.getElementById('rocket');
            rocket.textContent = '🚀';
            rocket.style.transform = '';
            rocket.style.animation = 'shake 0.3s infinite';
            rocketY = 0;
            document.getElementById('flame').style.display = 'block';
            document.getElementById('betInput').disabled = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('cashoutBtn').classList.add('hidden');
            document.getElementById('gameStatus').innerHTML = '⚡ Сделайте ставку';
            document.getElementById('gameStatus').style.color = '#ffd966';
            document.getElementById('multiplier').textContent = '1.00';
            document.getElementById('multiplierDisplay').textContent = 'x1.00';
            document.getElementById('crashProgress').style.width = '0%';
            sendToBot({ action: 'getBalance' });
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
